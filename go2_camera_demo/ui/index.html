<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>宇树 SDK 摄像头预览</title>
    <style>
        :root{--bg:#f5f7fb;--primary:#0a84ff;--dark:#222;--secondary:#666;--shadow:0 1px 2px rgba(0,0,0,0.05)}
        html,body{height:100%;margin:0}
        body{font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding:16px; background:var(--bg); color:var(--dark); box-sizing:border-box}
        .app-wrapper{max-width:100%;margin:0 auto;display:flex;flex-direction:column;gap:16px}
        h2{margin:0;font-size:1.4rem}

        /* Preview Area */
        .preview-area{position:relative;background:#000;border-radius:12px;overflow:hidden;box-shadow:0 4px 8px rgba(0,0,0,0.1)}
        #preview{display:block;width:100%;height:auto;object-fit:contain;background:#000;min-height:150px}
        .status-overlay{position:absolute;left:12px;top:12px;background:rgba(0,0,0,0.6);color:#fff;padding:8px 12px;border-radius:8px;font-size:0.9rem;display:flex;align-items:center;gap:8px}
        .spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Controls */
        .control-group{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
        .control-item{display:flex;align-items:center;gap:8px;background:#fff;padding:12px;border-radius:12px;box-shadow:var(--shadow)}
        
        button{padding:10px 16px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:0.95rem;cursor:pointer;transition:background-color 0.2s}
        button:hover{background:darken(var(--primary), 10%)}
        button.secondary{background:var(--secondary)}
        button.secondary:hover{background:darken(var(--secondary), 10%)}
        
        label{font-size:0.9rem;font-weight:600}
        input[type=range]{width:120px;flex-grow:1}
        input[type=number]{width:80px;padding:8px;border-radius:6px;border:1px solid #ddd;text-align:center}
        small.muted{color:var(--secondary);font-size:0.8rem}

        /* Full width on small screens */
        @media (max-width:600px){
            body{padding:8px}
            .control-item{flex:1 1 100%;flex-wrap:wrap}
            .control-item > * {flex-grow:0;flex-shrink:0}
            input[type=range], input[type=number]{width:auto;flex-grow:1;min-width:60px}
            button{flex:1 1 auto;min-width:48%;margin-bottom:4px}
        }

        footer{font-size:0.85rem;color:var(--secondary);margin-top:12px;line-height:1.4}
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header>
            <h2>SDK 摄像头预览</h2>
        </header>

        <section class="preview-area">
            <img id="preview" src="/api/image" alt="摄像头实时画面" />
            <div class="status-overlay" id="status">
                <span>加载中</span> <span class="spinner" id="spinner"></span>
            </div>
        </section>

        <section class="control-group">
            <div class="control-item">
                <button id="refreshBtn">手动刷新</button>
                <button id="toggleAutoBtn" class="secondary">自动刷新（关）</button>
            </div>

            <div class="control-item">
                <label for="widthInput">图像宽度</label>
                <input id="widthInput" type="number" min="64" max="1920" />
                <small class="muted">px (影响体积)</small>
            </div>

            <div class="control-item">
                <label for="qualityInput">JPG 质量</label>
                <input id="qualityInput" type="range" min="30" max="90" step="5" />
                <span id="qval">70</span>
            </div>

            <div class="control-item">
                <label for="intervalInput">刷新间隔</label>
                <input id="intervalInput" type="number" min="0.5" max="10" step="0.5" value="1" />
                <small class="muted">秒 (0.5 为最低)</small>
            </div>
        </section>

        <footer>
            建议在手机端将图像宽度设置为屏幕宽度或更小以节省流量；JPG 质量越低，图像体积越小但失真越明显。
        </footer>
    </div>

    <script>
        const img = document.getElementById('preview');
        const refreshBtn = document.getElementById('refreshBtn');
        const toggleAutoBtn = document.getElementById('toggleAutoBtn');
        const spinner = document.getElementById('spinner');
        const statusEl = document.getElementById('status');
        const widthInput = document.getElementById('widthInput');
        const qualityInput = document.getElementById('qualityInput');
        const qval = document.getElementById('qval');
        const intervalInput = document.getElementById('intervalInput');

        let CONFIG = {};
        let timer = null;
        let autoRefresh = false;
        let lastObjectUrl = null;

        // --- 初始化及工具函数 ---

        function detectDefaultWidth() {
            // 根据设备宽度选择一个合理的默认值，兼顾DPR，最大不超过1024
            const vw = Math.max(document.documentElement.clientWidth || 320, 320);
            const dpr = window.devicePixelRatio || 1;
            let px = Math.round(vw * dpr * 0.8); // 80% of screen width to be conservative
            return Math.min(px, 1024);
        }

        async function loadConfig() {
            try {
                const res = await fetch("config.json");
                if (!res.ok) throw new Error('HTTP ' + res.status);
                CONFIG = await res.json();
                console.info('配置加载成功: appUrl = ' + (CONFIG.appUrl || '未配置'));
            } catch (e) {
                console.warn('配置加载失败，将使用相对路径: ' + e.message);
            }
        }

        // --- 状态与UI更新 ---

        function setStatus(text, showSpinner = true) {
            statusEl.style.display = 'flex';
            statusEl.querySelector('span').textContent = text;
            spinner.style.display = showSpinner ? 'inline-block' : 'none';
        }

        function clearStatus() {
            statusEl.style.display = 'none';
        }

        function buildImageUrl() {
            // 确保 appUrl 不以斜杠结尾
            const base = CONFIG.appUrl ? CONFIG.appUrl.replace(/\/+$/, '') : '';
            const params = new URLSearchParams();
            
            // 确保输入值是有效数字
            const w = parseInt(widthInput.value) || undefined;
            const q = parseInt(qualityInput.value) || 70;
            
            if(w) params.set('w', String(w));
            if(q) params.set('q', String(q));
            params.set('_t', Date.now()); // 用于防止缓存
            
            const suffix = '/api/image?' + params.toString();
            return base + suffix;
        }

        // --- 核心功能：加载图像 ---

        async function loadImage() {
            const url = buildImageUrl();
            console.log('Loading image from:', url);
            try {
                setStatus('加载中', true);
                const res = await fetch(url, { cache: 'no-store' });
                
                if (res.status === 404) {
                    throw new Error('404 (API not found). 请检查 appUrl 配置或机器人是否启动服务。');
                }
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}. ${res.statusText || '请求失败'}`);
                }

                const blob = await res.blob();
                
                // 释放上一个 Blob URL 占用的内存
                if (lastObjectUrl) {
                    URL.revokeObjectURL(lastObjectUrl);
                }
                lastObjectUrl = URL.createObjectURL(blob);
                img.src = lastObjectUrl;
                
                setStatus('已更新', false);
                setTimeout(clearStatus, 800);
            } catch (err) {
                const errMsg = err.message || '未知错误';
                setStatus('加载失败: ' + errMsg, false);
                console.error('loadImage error:', err);
            }
        }

        // --- 自动刷新控制 ---

        function startAutoRefresh() {
            clearInterval(timer); // 先清除，防止重复
            const interval = Math.max(0.5, parseFloat(intervalInput.value) || 1) * 1000;
            timer = setInterval(loadImage, interval);
            
            toggleAutoBtn.textContent = '自动刷新（开）';
            toggleAutoBtn.classList.remove('secondary');
            autoRefresh = true;
        }

        function stopAutoRefresh() {
            clearInterval(timer);
            timer = null;
            
            toggleAutoBtn.textContent = '自动刷新（关）';
            toggleAutoBtn.classList.add('secondary');
            autoRefresh = false;
        }

        // --- 事件监听 ---

        // 初始化控件默认值
        widthInput.value = detectDefaultWidth();
        qualityInput.value = 70;
        qval.textContent = qualityInput.value;
        intervalInput.value = 1.0;

        qualityInput.addEventListener('input', () => { qval.textContent = qualityInput.value; });
        refreshBtn.addEventListener('click', loadImage);

        toggleAutoBtn.addEventListener('click', () => {
            if (autoRefresh) {
                stopAutoRefresh();
            } else {
                startAutoRefresh();
                loadImage(); // 立即加载一次
            }
        });

        intervalInput.addEventListener('change', () => {
            if (autoRefresh) {
                startAutoRefresh(); // 重新设置定时器
            }
        });

        // 页面加载完毕后立即尝试加载配置，然后加载图片
        window.addEventListener('load', async () => { 
            await loadConfig(); 
            loadImage();
        });

        // 离开页面时释放内存
        window.addEventListener('beforeunload', () => { 
            if (lastObjectUrl) URL.revokeObjectURL(lastObjectUrl); 
        });
    </script>
</body>
</html>
