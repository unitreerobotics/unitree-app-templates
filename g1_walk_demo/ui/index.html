<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SDK 控制面板</title>
    <style>
        :root {
            --color-bg: #FFFFFF; 
            --color-surface: #F9F9F9; 
            --color-text: #000000; 
            --color-primary-start: #FFD700; 
            --color-primary-end: #FFAB40; 
            --color-primary-text: #000000; 
            --color-secondary: #EFEFEF; 
            --color-secondary-text: #555555; 
            --color-log-bg: #EAEAEA; 
            --color-log-text: #000000; 
            --spacing-l: 24px;
            --spacing-m: 16px;
            --spacing-s: 8px;
            --radius-xl: 12px; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: var(--spacing-l);
            background: var(--color-bg);
            color: var(--color-text);
            margin: 0;
            line-height: 1.5;
            
            
        }

        h2, h3 {
            color: var(--color-text);
            margin-top: var(--spacing-l);
            margin-bottom: var(--spacing-m);
            font-weight: 700;
        }
        h2 { margin-top: 0; }

        .header {
            padding-bottom: var(--spacing-s);
            margin-bottom: var(--spacing-m);
        }

        
        .row {
            display: flex;
            gap: var(--spacing-s);
            align-items: center;
            margin-bottom: var(--spacing-m);
        }

        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--spacing-l);
            margin-bottom: var(--spacing-s);
        }

        
        button {
            padding: 14px var(--spacing-m); 
            margin: 0; 
            border-radius: var(--radius-xl); 
            border: none;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            transition: opacity 0.2s, background 0.2s, transform 0.1s;
            flex-grow: 1;
            
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
        }

        
        button:not(.secondary) {
            background: linear-gradient(90deg, var(--color-primary-start) 0%, var(--color-primary-end) 100%);
            color: var(--color-primary-text);
            box-shadow: 0 4px 15px rgba(255, 180, 0, 0.3); 
        }

        
        button.secondary {
            background: var(--color-secondary);
            color: var(--color-secondary-text);
            flex-grow: 0;
            min-width: 100px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); 
        }

        button:active:not(:disabled) {
            opacity: 0.8;
            transform: translateY(1px); 
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15); 
        }

        button:disabled {
            background: var(--color-secondary);
            opacity: 0.6;
            cursor: not-allowed;
            color: #AAAAAA;
            box-shadow: none;
        }

        
        #buttons {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-s);
            margin-top: var(--spacing-s);
            padding: var(--spacing-m);
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08); 
            border: 1px solid #EFEFEF; 
        }

        #buttons button {
            flex: 1 1 calc(50% - var(--spacing-s)); 
            min-width: 140px; 
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        #buttons.status-message {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            text-align: center;
        }

        
        pre#log {
            background: var(--color-log-bg);
            color: var(--color-log-text);
            padding: var(--spacing-m);
            border-radius: var(--radius-xl);
            
            
            overflow: auto;
            white-space: pre-wrap; 
            word-wrap: break-word;
            font-size: 13px;
            font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; 
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.1);
            border: 1px solid #DDDDDD;

            
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s ease-out, opacity 0.3s ease-out, padding 0.4s ease-out;
            visibility: hidden;
            margin-top: var(--spacing-s);
            margin-bottom: 0;
        }
        
        pre#log.show {
            max-height: 400px; 
            opacity: 1;
            padding: var(--spacing-m);
            visibility: visible;
        }

        
        .status-message {
            color: #999; 
            padding: var(--spacing-m) 0;
            text-align: center;
            width: 100%;
        }

        
        #logToggle {
            background: var(--color-secondary);
            color: var(--color-secondary-text);
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px; 
            cursor: pointer;
            transition: background 0.3s;
            flex-grow: 0;
            box-shadow: none;
            margin-right: var(--spacing-s); 
        }
        #logToggle.active {
            background: var(--color-primary-end); 
            color: var(--color-primary-text);
        }

        
        @media (max-width: 600px) {
            #buttons button {
                flex: 1 1 100%; 
            }
            body {
                padding: var(--spacing-m);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>动作列表</h2>
        </div>
 
        <div id="buttons" class="status-message">正在加载动作...</div>

        <div class="log-header">
            <h3>响应 / 日志</h3>
            <div>
                <button id="logToggle">显示日志</button>
                <button id="reloadBtn" class="secondary">刷新</button>
            </div>
        </div>
        
        <pre id="log">空</pre>
    </div>

    <script>
        const reloadBtn = document.getElementById('reloadBtn');
        const buttonsDiv = document.getElementById('buttons');
        const log = document.getElementById('log');
        const logToggle = document.getElementById('logToggle');
        let CONFIG = {};

        function sendIframeHeight() {
            try {
                const height = document.body.scrollHeight + 5; 
        
                window.parent.postMessage({
                    type: 'iframeResize',
                    height: height
                }, '*'); 

            } catch (e) {
                console.warn('Failed to send iframe height:', e);
            }
        }

        function toggleLog() {
            const isShown = log.classList.toggle('show');
            logToggle.textContent = isShown ? '隐藏日志' : '显示日志';
            logToggle.classList.toggle('active', isShown);
            
            setTimeout(sendIframeHeight, 450); 
        }
        logToggle.addEventListener('click', toggleLog);

        function appendLog(text) {
            const t = (new Date()).toLocaleTimeString('zh-CN', { hour12: false }) + '  ' + text + '\n';
            if (log.textContent.trim() === '空') log.textContent = '';
            
            log.textContent = t + log.textContent;

            const lines = log.textContent.split('\n');
            if (lines.length > 50) {
                log.textContent = lines.slice(0, 50).join('\n');
            }
        }

        async function loadConfig() {
            try {
                const res = await fetch("config.json");
                if (!res.ok) throw new Error('Failed to load config.json (HTTP ' + res.status + ')');
                CONFIG = await res.json();
                appendLog('配置加载成功: ' + (CONFIG.appUrl ? 'appUrl: ' + CONFIG.appUrl : 'appUrl未配置'));
            } catch (e) {
                appendLog('配置加载失败: ' + e.message);
            }
        }

        reloadBtn.addEventListener('click', () => {
            loadOptions();
            sendIframeHeight();
        });

        async function loadOptions() {
            const base = CONFIG.appUrl || ""; 
            
            if (!base) {
                buttonsDiv.innerHTML = '<div class="status-message">配置中没有 appUrl</div>';
                appendLog('加载失败: appUrl 未配置');
                buttonsDiv.classList.add('status-message');
                sendIframeHeight();
                return;
            }

            buttonsDiv.innerHTML = '<div class="status-message">加载中...</div>';
            buttonsDiv.classList.add('status-message');
            try {
                const res = await fetch(base + '/api/options');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                renderButtons(data.options || []);
                appendLog('已从 ' + base + ' 加载 ' + (data.options || []).length + ' 个动作');
            } catch (e) {
                buttonsDiv.innerHTML = '<div class="status-message">加载失败</div>';
                appendLog('加载失败: ' + e);
            }
            sendIframeHeight(); 
        }

        function renderButtons(options) {
            buttonsDiv.innerHTML = '';
            buttonsDiv.classList.remove('status-message');

            if (!options || options.length === 0) {
                buttonsDiv.innerHTML = '<div class="status-message">没有可用动作</div>';
                buttonsDiv.classList.add('status-message');
            } else {
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.textContent = opt.name;
                    btn.dataset.id = opt.id;
                    btn.addEventListener('click', () => execute(opt.id, btn));
                    buttonsDiv.appendChild(btn);
                })
            }
            sendIframeHeight();
        }

        async function execute(id, btn) {
            const base = CONFIG.appUrl;
            if (!base) {
                appendLog('执行失败 id=' + id + ' : appUrl 未配置');
                return;
            }

            const prev = btn.textContent;
            btn.textContent = '执行中...';
            btn.disabled = true;
            try {
                const res = await fetch(base + '/api/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: Number(id) })
                });

                let logMessage = '执行 id=' + id + ' -> ';
                if (res.ok) {
                    const data = await res.json();
                    logMessage += JSON.stringify(data).substring(0, 100) + (JSON.stringify(data).length > 100 ? '...' : ''); 
                } else {
                    logMessage += '请求失败 (HTTP ' + res.status + ')';
                }
                appendLog(logMessage);
            } catch (e) {
                appendLog('请求失败 id=' + id + ' : ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = prev;
                sendIframeHeight(); 
            }
        }

        (async function() {
            await loadConfig(); 
            await loadOptions(); 
            sendIframeHeight(); 
        })();
    </script>
</body>
</html>
