version: v0.1.0
base_image: image/cpp_sdk2:latest

permissions:
  - camera
  - motor

build_env:
  - apt update && apt install -y python3 pip && pip install fastapi uvicorn -i https://pypi.tuna.tsinghua.edu.cn/simple

startup_commands:
  - python3 /workspace/app/server/cmd_server.py

change_log: |
  - 初始版本发布
  - 添加了基本的前端页面
  - 支持自动化部署和配置
