<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宇树应用手机模拟视图</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --color-background: #f5f5f7;
            --color-card-bg: #ffffff;
            --color-text: #1c1c1e;
            --color-primary: #000000;
            --color-secondary: #8e8e93;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--color-background);
            font-family: 'Inter', sans-serif;
            padding: 20px;
            color: var(--color-text);
        }

        .config-view {
            width: 100%;
            max-width: 400px; 
            background: var(--color-card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 10px;
            text-align: center;
            color: var(--color-primary);
            font-weight: 700;
        }
        
        .subtitle {
            text-align: center;
            color: var(--color-secondary);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        
        #appListContainer {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .app-button {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--color-primary);
            color: var(--color-card-bg);
            border: none;
            border-radius: 10px; 
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            text-align: left;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .app-button:hover {
            background-color: #333;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }
        .app-button span {
            font-size: 0.8em; 
            opacity: 0.7;
            font-weight: 400;
            margin-left: 5px;
        }

        .mobile-view {
            display: none; 
            padding: 0;
            background: #000;
            border: 12px solid #1e1e1e;
            border-radius: 48px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            width: 375px;        
            height: 812px;       
            display: flex; 
            flex-direction: column; 
            box-sizing: content-box;
            position: relative;
        }
        .mobile-view::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: #1e1e1e;
            border-radius: 0 0 20px 20px;
            z-index: 2;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 8px;
            background: #fff;
            color: #000;
            font-size: 15px;
            font-weight: 600;
            flex-shrink: 0; 
            border-bottom: 1px solid #eee;
            position: relative;
            z-index: 1;
        }

        .status-bar .icons {
            display: flex;
            gap: 10px;
            font-size: 14px;
        }

        .mobile-view iframe {
            width: 100%;
            flex-grow: 1; 
            border: none;
        }

        .back-button {
            position: absolute;
            top: 50px;
            left: calc(50% + 187.5px + 20px); 
            z-index: 10;
            padding: 10px 18px;
            background: var(--color-text);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .back-button:hover {
                background: #555;
        }
        
        @media (max-width: 900px) {
            .mobile-view {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
            .mobile-view::before {
                display: none;
            }
            .back-button {
                left: 10px;
                top: 10px;
            }
            .config-view {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    
    <div class="config-view" id="configView">
        <h1>选择要预览的应用</h1>
        <p class="subtitle">服务器已在上一级目录中递归搜索带 index.html 的应用。</p>
        
        <div id="appListContainer">
            <p id="loadingMessage" style="text-align: center; color: var(--color-primary); font-weight: 500;">正在连接服务器获取应用列表...</p>
        </div>
    </div>

    <div class="mobile-view" id="mobileView">
        <div class="status-bar">
            <span class="time" id="currentTime">12:00</span>
            <div class="icons">
                <span class="signal">📶</span>
                <span class="battery">🔋</span>
            </div>
        </div>
        
        <iframe id="appIframe" title="Embedded Application"></iframe>
    </div>

    <button class="back-button" id="backButton" style="display: none;">← 返回选择器</button>

    <script>
        const configView = document.getElementById('configView');
        const mobileView = document.getElementById('mobileView');
        const appListContainer = document.getElementById('appListContainer');
        const loadingMessage = document.getElementById('loadingMessage');
        const appIframe = document.getElementById('appIframe');
        const backButton = document.getElementById('backButton');
        const currentTimeEl = document.getElementById('currentTime');

        const LAST_APP_URL_KEY = 'unitree_last_app_path';

        function saveLastUrl(appPath) {
            localStorage.setItem(LAST_APP_URL_KEY, appPath);
        }

        function loadLastUrl() {
            return localStorage.getItem(LAST_APP_URL_KEY);
        }

        function showConfigView() {
            mobileView.style.display = 'none';
            backButton.style.display = 'none';
            configView.style.display = 'block';
            appIframe.src = 'about:blank';
        }
        
        function showMobileView(appPath) {
            const targetUrl = `/${appPath}/index.html`;
            appIframe.src = targetUrl;
            
            saveLastUrl(appPath); 
            
            configView.style.display = 'none';
            mobileView.style.display = 'flex';
            backButton.style.display = 'block';
        }
        
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            currentTimeEl.textContent = `${hours}:${minutes}`;
        }

        function initView(availableApps) {
            const lastAppPath = loadLastUrl();
            if (lastAppPath && availableApps.includes(lastAppPath)) {
                console.log(`从缓存中恢复应用: /${lastAppPath}/index.html`);
                showMobileView(lastAppPath);
            } else {
                showConfigView();
            }
        }

        const fetchWithRetry = async (url, options = {}, retries = 3) => {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response;
                } catch (error) {
                    if (i < retries - 1) {
                        const delay = Math.pow(2, i) * 1000;
                        await new Promise(resolve => setTimeout(resolve, delay));
                    } else {
                        throw error;
                    }
                }
            }
        };

        function loadAppList() {
            fetchWithRetry('/api/list_apps')
                .then(response => response.json())
                .then(data => {
                    const apps = data.apps || [];
                    appListContainer.innerHTML = '';
                    
                    if (apps.length > 0) {
                        apps.forEach(appPath => {
                            const button = document.createElement('button');
                            button.className = 'app-button';
                            
                            const parts = appPath.split('/');
                            const displayName = parts[parts.length - 1];
                            button.innerHTML = `<strong>${displayName}</strong> <span>${appPath}</span>`;
                            
                            button.addEventListener('click', () => {
                                showMobileView(appPath);
                                console.log(`已加载应用: /${appPath}/index.html`);
                            });

                            appListContainer.appendChild(button);
                        });
                    } else {
                        appListContainer.innerHTML = '<p style="text-align: center; color: #ff3b30; font-weight: 500;">未找到任何带有 index.html 的应用目录。</p>';
                    }
                    
                    initView(apps);
                })
                .catch(e => {
                    appListContainer.innerHTML = `<p style="text-align: center; color: #ff3b30;">加载应用列表失败，请确保 Python 服务器正在运行: ${e.message}</p>`;
                    console.error("Fetch Error:", e);
                    showConfigView(); 
                });
        }

        backButton.addEventListener('click', () => {
             saveLastUrl('');
             showConfigView();
        });

        window.onload = function() {
            updateTime(); 
            setInterval(updateTime, 60000); 

            loadAppList();
        };
    </script>
</body>
</html>
